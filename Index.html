<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Demo - Live in Browser</title>
    <link rel="icon" href="data:,">
    <!-- COI ServiceWorker enables SharedArrayBuffer on GitHub Pages (required by v86 WASM) -->
    <script src="coi-serviceworker.js"></script>
    <!-- v86 emulator served locally (downloaded during CI build) -->
    <script src="libv86.js"></script>
    <style>
        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
        }

        #screen_container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 46px);
            padding: 10px;
            box-sizing: border-box;
        }

        #screen_container > div {
            white-space: pre;
            font: 16px monospace;
            line-height: 16px;
            width: min(96vw, 1400px);
            height: min(calc(100vh - 80px), 900px);
            max-width: 100%;
            max-height: 100%;
            overflow: auto;
            background: #000;
        }

        #screen_container > canvas {
            max-width: min(96vw, 1400px);
            max-height: min(calc(100vh - 80px), 900px);
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            background: #000;
        }
    </style>
</head>
<body>

    <div style="padding:12px; background:#111; border-bottom:1px solid #444; font-size:14px;">
        <strong>Live Demo status:</strong>
        <span id="status">inicializuji...</span>
    </div>

    <div id="screen_container">
        <!-- Zde se vykreslí obrazovka vašeho OS -->
        <div></div>
        <canvas style="display: none;" aria-label="Emulator display"></canvas>
    </div>

    <pre id="error_log" style="display:none; margin:0; padding:12px; background:#2b0000; color:#ffb3b3; border-top:1px solid #5a1f1f; white-space:pre-wrap;"></pre>

    <script>
    (function () {
        var statusEl = document.getElementById("status");
        var errorEl = document.getElementById("error_log");

        function setStatus(message) {
            statusEl.textContent = message;
        }

        function showError(message) {
            errorEl.style.display = "block";
            errorEl.textContent = message;
            setStatus("chyba");
        }

        function startEmulator() {
            setStatus("spouštím emulátor...");

            try {
                var options = {
                    wasm_path: "v86.wasm",
                    memory_size: 2 * 1024 * 1024 * 1024,
                    vga_memory_size: 16 * 1024 * 1024,
                    screen_container: document.getElementById("screen_container"),
                    cdrom: {
                        url: "./os.iso",
                    },
                    autostart: true,
                    bios: { url: "seabios.bin" },
                    vga_bios: { url: "vgabios.bin" },
                };

                var emulator;
                if (typeof V86 !== "undefined") {
                    emulator = new V86(options);
                } else if (typeof V86Starter !== "undefined") {
                    emulator = new V86Starter(options);
                } else {
                    showError("Ani V86 ani V86Starter nejsou dostupne. libv86.js se pravdepodobne nenasel nebo je nekompatibilni.");
                    return;
                }

                if (emulator && typeof emulator.add_listener === "function") {
                    emulator.add_listener("emulator-ready", function () {
                        setStatus("emulátor běží");
                    });
                } else {
                    setStatus("emulátor spuštěn");
                }
            } catch (err) {
                showError("Start emulátoru selhal: " + (err && err.message ? err.message : String(err)));
            }
        }

        window.addEventListener("error", function (event) {
            showError("JavaScript chyba: " + event.message);
        });

        window.addEventListener("unhandledrejection", function (event) {
            var reason = event.reason && event.reason.message ? event.reason.message : String(event.reason);
            showError("Promise chyba: " + reason);
        });

        window.addEventListener("load", function () {
            startEmulator();
        });
    })();
    </script>
</body>
</html>
