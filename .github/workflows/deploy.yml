name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-multilib \
            libc6-dev-i386 \
            nasm \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            binutils

      - name: Build kernel and ISO
        run: |
          set -e
          mkdir -p iso/boot/grub build
          INCLUDE_FLAGS="-Isrc/kernel/core -Isrc/kernel/lib -Isrc/kernel/lib/progs -Isrc/kernel/hardware -Isrc/kernel/filesystem -Isrc/kernel/shell -Isrc/kernel/memory"
          nasm -f elf32 src/boot/boot.asm -o build/boot.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/core/kernel.c -o build/kernel.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/lib/common.c -o build/common.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/hardware/console.c -o build/console.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/hardware/keyboard.c -o build/keyboard.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/shell/shell.c -o build/shell.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/filesystem/filesys.c -o build/filesys.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/shell/input.c -o build/input.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/lib/progs/meowim.c -o build/meowim.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/memory/heap.c -o build/heap.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/hardware/screen.c -o build/screen.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/hardware/renderer.c -o build/renderer.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/memory/paging.c -o build/paging.o
          gcc -ffreestanding -m32 $INCLUDE_FLAGS -c src/kernel/core/process.c -o build/process.o
          ld -m elf_i386 -T config/linker/linker.ld -o build/kernel.elf \
              build/boot.o build/kernel.o build/common.o build/console.o build/keyboard.o build/shell.o build/filesys.o build/input.o build/meowim.o build/heap.o build/screen.o build/renderer.o build/paging.o build/process.o
          cp build/kernel.elf iso/boot/
          cp config/grub/grub.cfg iso/boot/grub/grub.cfg
          grub-mkrescue -o os.iso iso/

      - name: Prepare site directory
        run: |
          mkdir -p _site
          touch _site/.nojekyll

      - name: Download v86 assets
        run: |
          V86_VERSION="0.5.319"
          curl -fsSL "https://cdn.jsdelivr.net/npm/v86@${V86_VERSION}/build/libv86.js" \
               -o _site/libv86.js
          curl -fsSL "https://cdn.jsdelivr.net/npm/v86@${V86_VERSION}/build/v86.wasm" \
               -o _site/v86.wasm
          # BIOS files are not shipped in npm package v86, keep official upstream source.
          curl -fsSL "https://raw.githubusercontent.com/copy/v86/master/bios/seabios.bin" \
               -o _site/seabios.bin
          curl -fsSL "https://raw.githubusercontent.com/copy/v86/master/bios/vgabios.bin" \
               -o _site/vgabios.bin
          curl -fsSL "https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/coi-serviceworker.min.js" \
               -o _site/coi-serviceworker.js

      - name: Copy site files
        run: |
          cp Index.html _site/index.html
          cp os.iso _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
